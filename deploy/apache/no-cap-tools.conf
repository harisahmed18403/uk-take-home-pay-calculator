<VirtualHost *:80>
    ServerName no-cap-tools.com
    ServerAlias www.no-cap-tools.com
    ServerAdmin webmaster@localhost

    DocumentRoot /var/www/no-cap-tools/root

    ErrorLog ${APACHE_LOG_DIR}/no-cap-tools_error.log
    CustomLog ${APACHE_LOG_DIR}/no-cap-tools_access.log combined

    <Directory /var/www/no-cap-tools/root>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    Alias /uk-take-home-pay-calculator /var/www/no-cap-tools/uk-take-home-pay-calculator

    <Directory /var/www/no-cap-tools/uk-take-home-pay-calculator>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
        SetEnv APP_BASE_PATH /uk-take-home-pay-calculator
    </Directory>
</VirtualHost>
