<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName no-cap-tools.com
    ServerAlias www.no-cap-tools.com
    ServerAdmin webmaster@localhost

    DocumentRoot /var/www/no-cap-tools/root

    ErrorLog ${APACHE_LOG_DIR}/no-cap-tools_error.log
    CustomLog ${APACHE_LOG_DIR}/no-cap-tools_access.log combined

    <Directory /var/www/no-cap-tools/root>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    Alias /uk-take-home-pay-calculator /var/www/no-cap-tools/uk-take-home-pay-calculator

    <Directory /var/www/no-cap-tools/uk-take-home-pay-calculator>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
        SetEnv APP_BASE_PATH /uk-take-home-pay-calculator
        SetEnv APP_ROOT_URL https://no-cap-tools.com
        SetEnv APP_SITE_URL https://no-cap-tools.com/uk-take-home-pay-calculator
    </Directory>

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/no-cap-tools.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/no-cap-tools.com/privkey.pem
</VirtualHost>
</IfModule>
