<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Cap Tools</title>
    <meta name="description" content="Small salary and money tools by Haris Ahmed.">
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe7;
            --card: #fffaf4;
            --ink: #14213d;
            --muted: #52606d;
            --accent: #d35400;
            --accent-dark: #8f2d00;
            --border: rgba(20, 33, 61, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(211, 84, 0, 0.18), transparent 30%),
                radial-gradient(circle at bottom right, rgba(20, 33, 61, 0.12), transparent 35%),
                var(--bg);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        main {
            width: min(720px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 24px 60px rgba(20, 33, 61, 0.08);
        }

        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.16em;
            font-size: 0.78rem;
            color: var(--accent-dark);
        }

        h1 {
            font-size: clamp(2.2rem, 5vw, 4rem);
            line-height: 0.95;
            margin: 16px 0;
        }

        p {
            font-size: 1.08rem;
            line-height: 1.6;
            color: var(--muted);
            max-width: 56ch;
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 18px;
            padding: 14px 20px;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
        }

        a:hover {
            background: var(--accent-dark);
        }
    </style>
</head>
<body>
    <main>
        <div class="eyebrow">No Cap Tools</div>
        <h1>Practical salary tools, starting with UK take-home pay.</h1>
        <p>
            This domain hosts focused calculators and explainers. The first tool is a UK take-home pay calculator
            covering tax, National Insurance, pension deductions, and student loan repayments.
        </p>
        <a href="/uk-take-home-pay-calculator/">Open the calculator</a>
    </main>
</body>
</html>
